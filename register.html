<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Diamond Tech</title>

<style>

/* 🔹 Full Page Background */
body{
    height:100vh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;

    /* 👉 ADD YOUR IMAGE HERE */
    background: url("splashbg.png") no-repeat center center/cover;
}

/* 🔹 Optional Overlay (makes UI look premium) */
body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4); /* adjust opacity */
    z-index:0;
}

/* 🔹 Register Box */
.register-box{
    position:relative;
    z-index:1;
    width:400px;
    padding:40px;
    background:rgba(255,255,255,0.95);
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* Inputs */
input{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:8px;
}

/* Button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2c3e50;
    color:white;
    cursor:pointer;
}

/* Messages */
.message{
    margin-top:15px;
    color:red;
}
.success{
    color:green;
}

</style>
</head>

<body>

<div class="register-box">
    <h2>Create Account</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <div id="msg" class="message"></div>

    <p style="margin-top:15px;">
        Already have an account?
        <a href="login.html">Login here</a>
    </p>
</div>

<script>
async function register(){

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const response = await fetch("http://localhost:3000/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await response.json();

    if(response.ok){
        document.getElementById("msg").className = "success";
        document.getElementById("msg").innerText = "Registration successful! Redirecting...";
        setTimeout(()=>{
            window.location.href = "login.html";
        },1500);
    } else {
        document.getElementById("msg").innerText = data.message;
    }
}
</script>

</body>
</html>
