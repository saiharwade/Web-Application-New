<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History - D-Vision Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark:       #020b18;
  --bg-panel:      rgba(4, 18, 38, 0.82);
  --bg-card:       rgba(6, 24, 50, 0.9);
  --cyan:          #00e5ff;
  --cyan-dim:      rgba(0,229,255,0.16);
  --cyan-glow:     rgba(0,229,255,0.55);
  --green:         #00ff9d;
  --yellow:        #ffe033;
  --red:           #ff3c5a;
  --text-bright:   #e8f4ff;
  --text-muted:    #6a90b8;
  --border:        rgba(0,229,255,0.22);
  --border-bright: rgba(0,229,255,0.6);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Exo 2', sans-serif;
  background: var(--bg-dark);
  color: var(--text-bright);
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,80,160,0.35) 0%, transparent 70%),
    linear-gradient(180deg, rgba(0,18,40,.94) 0%, rgba(2,11,24,1) 100%);
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

.header {
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: rgba(2,11,24,0.9);
  border-bottom: 1px solid var(--border-bright);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.header::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--cyan-glow), transparent);
  animation: scanH 3s linear infinite;
}

@keyframes scanH {
  0%   { transform: scaleX(0); transform-origin: left; }
  50%  { transform: scaleX(1); transform-origin: left; }
  50.1%{ transform: scaleX(1); transform-origin: right; }
  100% { transform: scaleX(0); transform-origin: right; }
}

.header-left { display:flex; align-items:center; gap:14px; }
.header-left img { width:44px; filter: drop-shadow(0 0 6px var(--cyan)); }
.brand-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--cyan);
  text-shadow: 0 0 18px var(--cyan-glow);
}
.brand-sub {
  font-size:11px;
  color:var(--text-muted);
  letter-spacing:3px;
  font-family:'Share Tech Mono', monospace;
}

.header-right {
  font-family:'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 2px;
}

.page {
  width: min(1180px, calc(100% - 32px));
  margin: 18px auto 110px;
}

.panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  backdrop-filter: blur(14px);
  box-shadow: 0 0 24px rgba(0,0,0,.18);
}

.panel-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  color: var(--text-muted);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px;
  margin-bottom: 16px;
}

.search-row {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 18px;
}

.search-box {
  position:relative;
}

.search-box input {
  width:100%;
  padding:14px 48px 14px 16px;
  border-radius:8px;
  border:1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-bright);
  font-family:'Exo 2', sans-serif;
  font-size:15px;
  outline:none;
  transition:.25s;
}

.search-box input:focus {
  border-color: var(--border-bright);
  box-shadow: 0 0 12px var(--cyan-dim);
}

.search-box input::placeholder { color: var(--text-muted); }

.search-box span {
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:16px;
  color:var(--cyan);
}

.history-card {
  background: var(--bg-card);
  border:1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 14px;
  overflow:hidden;
  transition:.25s;
}

.history-card:hover {
  border-color: var(--border-bright);
  box-shadow: 0 0 18px rgba(0,229,255,.08);
}

.card-header {
  padding:16px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  background: linear-gradient(135deg, rgba(0,80,160,0.16), rgba(0,20,60,0.18));
}

.card-header h3 {
  font-family:'Rajdhani', sans-serif;
  font-size: 20px;
  letter-spacing: 1px;
  color: var(--text-bright);
}

.card-header small {
  display:block;
  margin-top:6px;
  color: var(--text-muted);
  font-size:11px;
  font-family:'Share Tech Mono', monospace;
  letter-spacing:1px;
}

.arrow {
  font-size:18px;
  color: var(--cyan);
}

.card-content {
  background: rgba(3,15,32,0.92);
  border-top: 1px solid var(--border);
  padding:18px;
  display:none;
}

.preview-row {
  display:grid;
  grid-template-columns: 110px 1fr;
  gap:16px;
  align-items:center;
  margin-bottom:16px;
}

.preview-box {
  width:110px;
  height:90px;
  border-radius:10px;
  overflow:hidden;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  display:flex;
  align-items:center;
  justify-content:center;
}

.preview-box img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.meta-grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}

.meta-box {
  background: rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 12px;
}

.meta-label {
  font-size:10px;
  color:var(--text-muted);
  font-family:'Share Tech Mono', monospace;
  letter-spacing:1px;
}

.meta-value {
  margin-top:4px;
  font-family:'Rajdhani', sans-serif;
  font-size:16px;
  color:var(--cyan);
  font-weight:600;
}

.button-row {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:12px;
  margin-top:14px;
}

.btn {
  padding:12px;
  border:1px solid var(--border);
  border-radius:8px;
  font-size:15px;
  cursor:pointer;
  background: linear-gradient(135deg, rgba(0,60,130,0.42), rgba(0,20,60,0.72));
  color: var(--text-bright);
  font-family:'Rajdhani', sans-serif;
  font-weight:600;
  letter-spacing:1px;
  transition:.25s;
}

.btn:hover {
  border-color: var(--border-bright);
  box-shadow: 0 0 12px rgba(0,229,255,.16);
}

.btn.delete {
  color: var(--red);
  border-color: rgba(255,60,90,.45);
  background: linear-gradient(135deg, rgba(90,12,25,0.7), rgba(45,8,16,0.9));
}

.btn.share {
  color: var(--green);
  border-color: rgba(0,255,157,.35);
}

.empty-state {
  text-align:center;
  padding:26px;
  font-family:'Share Tech Mono', monospace;
  font-size:12px;
  color: var(--text-muted);
  border:1px dashed var(--border);
  border-radius:10px;
  background: rgba(255,255,255,.02);
}

.bottom-nav {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:84px;
  background: rgba(2,11,24,0.94);
  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;
  border-top:1px solid var(--border-bright);
  backdrop-filter: blur(10px);
}

.nav-item {
  min-width: 150px;
  text-align:center;
  font-family:'Rajdhani', sans-serif;
  font-size:15px;
  color:var(--text-muted);
  cursor:pointer;
  padding:10px 18px;
  border-radius:10px;
  border:1px solid transparent;
  transition:.25s;
  letter-spacing:1px;
}

.nav-item:hover {
  color: var(--cyan);
  border-color: var(--border);
  background: rgba(255,255,255,0.03);
}

.nav-item.active {
  color: var(--cyan);
  border-color: var(--border-bright);
  background: var(--cyan-dim);
  box-shadow: 0 0 14px rgba(0,229,255,.12);
}

@media (max-width: 900px) {
  .search-row,
  .button-row,
  .meta-grid,
  .preview-row {
    grid-template-columns: 1fr;
  }

  .page {
    width: calc(100% - 20px);
    margin-bottom: 120px;
  }

  .header {
    padding: 0 14px;
  }

  .brand-sub,
  .header-right { display:none; }

  .nav-item {
    min-width: unset;
    width: 30%;
    font-size: 14px;
  }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="mindronbluelogo.jpg" alt="logo">
    <div>
      <div class="brand-name">D-VISION PRO</div>
      <div class="brand-sub">DIAMOND SEGREGATION SYSTEM</div>
    </div>
  </div>
  <div class="header-right">SCAN HISTORY PANEL</div>
</div>

<div class="page">
  <div class="panel">
    <div class="panel-title">History Archive</div>

    <div class="search-row">
      <div class="search-box">
        <input type="text" id="searchLot" placeholder="Search by Lot No">
        <span>⌕</span>
      </div>
      <div class="search-box">
        <input type="text" id="searchCertificate" placeholder="Search by Certificate">
        <span>⌕</span>
      </div>
    </div>

    <div id="historyContainer"></div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="goToDashboard()">🏠 DASHBOARD</div>
  <div class="nav-item active">🕘 HISTORY</div>
  <div class="nav-item" onclick="goToAbout()">ℹ ABOUT</div>
</div>

<script>
function goToDashboard(){
  window.location.href = 'dashboard.html';
}

function goToAbout(){
  window.location.href = 'about.html';
}

async function loadHistory(){
  try {
    const response = await fetch('http://localhost:3000/history');
    const data = await response.json();

    const container = document.getElementById('historyContainer');
    container.innerHTML = '';

    if(data.length === 0){
      container.innerHTML = '<div class="empty-state">NO SCAN RECORDS AVAILABLE</div>';
      return;
    }

    data.forEach((item, index) => {
      const createdDate = item.createdAt ? new Date(item.createdAt) : new Date();
      const card = document.createElement('div');
      card.className = 'history-card';

      card.innerHTML = `
        <div class="card-header" onclick="toggleCard(this)">
          <div>
            <h3>${index + 1}. ${item.fileName}</h3>
            <small>${createdDate.toLocaleDateString('en-IN')} · ${createdDate.toLocaleTimeString('en-GB')}</small>
          </div>
          <div class="arrow">▶</div>
        </div>

        <div class="card-content">
          <div class="preview-row">
            <div class="preview-box">
              <img src="${item.url}" alt="scan preview">
            </div>
            <div class="meta-grid">
              <div class="meta-box">
                <div class="meta-label">FILE NAME</div>
                <div class="meta-value">${item.fileName}</div>
              </div>
              <div class="meta-box">
                <div class="meta-label">RECORDED</div>
                <div class="meta-value">${createdDate.toLocaleDateString('en-IN')}</div>
              </div>
              <div class="meta-box">
                <div class="meta-label">STATUS</div>
                <div class="meta-value">SAVED</div>
              </div>
            </div>
          </div>

          <div class="button-row">
            <button class="btn result" onclick="viewResult('${item.url}')">RESULT</button>
            <button class="btn certificate" onclick="viewCertificate('${item.fileName}')">CERTIFICATE</button>
            <button class="btn compare" onclick="compareImage('${item.fileName}')">COMPARE</button>
          </div>

          <div class="button-row">
            <button class="btn delete" onclick="deleteImage('${item.fileName}')">DELETE</button>
            <button class="btn gmail" onclick="sendGmail('${item.fileName}')">SEND MAIL</button>
            <button class="btn share" onclick="shareImage('${item.url}')">SHARE</button>
          </div>
        </div>
      `;

      container.appendChild(card);
    });
  } catch(error) {
    console.error('Error loading history:', error);
    document.getElementById('historyContainer').innerHTML = '<div class="empty-state">UNABLE TO LOAD HISTORY</div>';
  }
}

function toggleCard(element){
  const content = element.nextElementSibling;
  const arrow = element.querySelector('.arrow');

  if(content.style.display === 'block'){
    content.style.display = 'none';
    arrow.innerHTML = '▶';
  } else {
    content.style.display = 'block';
    arrow.innerHTML = '▼';
  }
}

function viewResult(imageUrl){
  const encodedUrl = encodeURIComponent(imageUrl);
  window.location.href = 'result.html?image=' + encodedUrl;
}

async function deleteImage(fileName){
  await fetch(`http://localhost:3000/delete/${fileName}`, {
    method: 'DELETE'
  });
  loadHistory();
}

function viewCertificate(fileName){
  alert('Generate certificate for ' + fileName);
}

function compareImage(fileName){
  alert('Compare image ' + fileName);
}

function sendGmail(fileName){
  alert('Send to Gmail: ' + fileName);
}

function shareImage(url){
  if(navigator.share){
    navigator.share({
      title: 'Diamond Scan Result',
      text: 'Check this scan',
      url: url
    });
  } else {
    alert('Sharing not supported on this browser');
  }
}

window.onload = loadHistory;
</script>

</body>
</html>
